name: Autodeploy to Streamlit

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    # Allows manual triggering from the Actions UI
    inputs: {}

jobs:
  deploy:
    name: Run tests and trigger Streamlit deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: (Optional) Run quick syntax check
        run: python -m py_compile streamlit_app.py || true

      - name: Trigger Streamlit deploy
        env:
          STREAMLIT_DEPLOY_URL: ${{ secrets.STREAMLIT_DEPLOY_URL }}
          STREAMLIT_API_TOKEN: ${{ secrets.STREAMLIT_API_TOKEN }}
          STREAMLIT_APP_ID: ${{ secrets.STREAMLIT_APP_ID }}
        run: |
          set -e
          if [ -z "$STREAMLIT_API_TOKEN" ] || [ -z "$STREAMLIT_APP_ID" ]; then
            echo "Missing required secrets: STREAMLIT_API_TOKEN and/or STREAMLIT_APP_ID"
            echo "Set these in your repository secrets (Settings → Secrets → Actions)."
            exit 1
          fi
          if [ -z "$STREAMLIT_DEPLOY_URL" ]; then
            echo "No STREAMLIT_DEPLOY_URL provided; using placeholder 'https://api.streamlit.io/api/v1'"
            STREAMLIT_DEPLOY_URL="https://api.streamlit.io/api/v1"
          fi
          echo "Triggering deploy for app id: $STREAMLIT_APP_ID"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$STREAMLIT_DEPLOY_URL/apps/$STREAMLIT_APP_ID/deploy" \
            -H "Authorization: Bearer $STREAMLIT_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}') || true
          echo "Streamlit deploy endpoint returned status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Deploy triggered successfully."
          else
            echo "Non-success response from deploy endpoint. Check secrets and API URL."
            exit 1
          fi
